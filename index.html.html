<!DOCTYPE html>
<html lang="hi">
<head>
   <meta name="ppck-ver" content="e9af0f3644d73df46e4fb3b5d859c701" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$100 Earn Click Here</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: #1a3b5d;
            font-size: 4rem;
            text-align: center;
            margin: 0;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            border: 3px solid transparent;
        }
        
        h1:hover {
            color: #0078ff;
            transform: scale(1.05);
            text-shadow: 4px 4px 8px rgba(0,120,255,0.3);
            border-color: #0078ff;
            border-radius: 15px;
            background-color: rgba(255,255,255,0.1);
        }
        
        .click-instruction {
            font-size: 1.2rem;
            color: #666;
            margin-top: -10px;
            margin-bottom: 30px;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0% { opacity: 0.7; }
            50% { opacity: 1; color: #0078ff; }
            100% { opacity: 0.7; }
        }
        
        .mouse-arrow {
            position: fixed;
            width: 26px;
            height: 35px;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
        }
        
        .mouse-arrow svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #0078ff, #00c6ff);
            width: 0%;
            transition: width 0.1s linear;
            z-index: 10001;
            box-shadow: 0 0 15px #0078ff;
        }
        
        .status-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a3b5d;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .hidden-iframe {
            display: none;
        }
        
        .main-content {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        
        .earn-badge {
            background: linear-gradient(135deg, #0078ff, #00c6ff);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="status-box" id="statusBox">⏰ 3 सेकंड में क्लिक...</div>
    
    <div class="main-content">
        <div class="earn-badge">🔥 सीमित समय का ऑफर</div>
        <h1 id="clickableEarnText">$100 Earn Click Here</h1>
        <div class="click-instruction">✨ इस टेक्स्ट पर क्लिक करें और $100 पाएं ✨</div>
    </div>

    <div class="mouse-arrow" id="mouseArrow">
        <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" 
                  fill="white" 
                  stroke="#333333" 
                  stroke-width="1.5" 
                  stroke-linejoin="round"/>
            <path d="M8 12L12 16M12 16L16 12M12 16L12 21" 
                  stroke="#666666" 
                  stroke-width="1.2" 
                  stroke-linecap="round"/>
        </svg>
        <div style="position: absolute; top: 2px; left: 2px; width: 100%; height: 100%; opacity: 0.3; z-index: -1; filter: blur(1px);">
            <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" fill="black"/>
            </svg>
        </div>
    </div>

    <!-- Hidden iframe for popup bypass -->
    <iframe class="hidden-iframe" id="popupFrame" name="popupFrame"></iframe>

    <script>
        (function() {
            const clickableElement = document.getElementById('clickableEarnText');
            const mouseArrow = document.getElementById('mouseArrow');
            const progressBar = document.getElementById('progressBar');
            const statusBox = document.getElementById('statusBox');
            const popupFrame = document.getElementById('popupFrame');
            
            let secondsLeft = 3;
            let clickAttempted = false;
            
            // Function to update status
            function updateStatus(text) {
                statusBox.textContent = text;
            }
            
            // Move arrow to clickable element
            function moveArrowToTarget() {
                if (clickableElement) {
                    const rect = clickableElement.getBoundingClientRect();
                    const targetX = rect.left + (rect.width / 2) - 13;
                    const targetY = rect.top + (rect.height / 2) - 20;
                    
                    mouseArrow.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    mouseArrow.style.left = targetX + 'px';
                    mouseArrow.style.top = targetY + 'px';
                }
            }
            
            // Function to open URL bypassing popup blocker
            function openURL(url) {
                if (!url) return false;
                
                try {
                    // Method 1: Try to open in same window
                    if (url.startsWith('http')) {
                        window.location.href = url;
                        return true;
                    }
                    
                    // Method 2: Try using iframe
                    if (popupFrame) {
                        popupFrame.src = url;
                        return true;
                    }
                    
                    // Method 3: Create temporary form
                    const form = document.createElement('form');
                    form.method = 'GET';
                    form.action = url;
                    form.target = '_blank';
                    document.body.appendChild(form);
                    form.submit();
                    document.body.removeChild(form);
                    return true;
                    
                } catch (e) {
                    console.log('URL open failed:', e);
                    return false;
                }
            }
            
            // Main click function
            function performClick() {
                if (clickAttempted) return;
                clickAttempted = true;
                
                updateStatus('⚡ क्लिक हो रहा है...');
                
                if (!clickableElement) {
                    updateStatus('❌ एलिमेंट नहीं मिला');
                    return;
                }
                
                try {
                    // Arrow animation
                    mouseArrow.style.transform = 'translate(1px, 1px) scale(0.98)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translate(0, 0) scale(1)';
                    }, 100);
                    
                    // Update progress bar
                    progressBar.style.background = 'linear-gradient(90deg, #00ff00, #00cc00)';
                    
                    // Simulate click on the element
                    const clickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true
                    });
                    clickableElement.dispatchEvent(clickEvent);
                    
                    // Multiple URL opening attempts
                    let clicked = false;
                    
                    // Method 1: Google (main target)
                    setTimeout(() => {
                        if (!clicked) {
                            clicked = true;
                            updateStatus('✅ क्लिक सफल! रीडायरेक्ट...');
                            openURL('https://www.google.com');
                        }
                    }, 500);
                    
                    // Method 2: Backup URL
                    setTimeout(() => {
                        if (!clicked) {
                            clicked = true;
                            openURL('https://www.google.com/search?q=$100+earn+online');
                        }
                    }, 1000);
                    
                } catch (error) {
                    console.log('Click error:', error);
                    updateStatus('❌ एरर, रीट्राई...');
                    
                    // Fallback
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 500);
                }
            }
            
            // Timer function
            function updateCounter() {
                const progress = ((3 - secondsLeft) / 3) * 100;
                progressBar.style.width = progress + '%';
                
                if (secondsLeft > 0) {
                    updateStatus(`⏰ ${secondsLeft} सेकंड में क्लिक...`);
                    
                    // Hover effect
                    mouseArrow.style.transform = 'translateY(-1px)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translateY(0)';
                    }, 200);
                    
                    secondsLeft--;
                    setTimeout(updateCounter, 1000);
                } else {
                    performClick();
                }
            }
            
            // Initialize
            window.addEventListener('load', function() {
                setTimeout(() => {
                    moveArrowToTarget();
                    
                    mouseArrow.style.transition = 'none';
                    mouseArrow.style.left = '50%';
                    mouseArrow.style.top = '20%';
                    
                    setTimeout(() => {
                        moveArrowToTarget();
                        updateCounter();
                    }, 100);
                    
                }, 1000);
            });
            
            // Handle resize and scroll
            window.addEventListener('resize', moveArrowToTarget);
            window.addEventListener('scroll', moveArrowToTarget);
            
            // Manual click handler
            clickableElement.addEventListener('click', function(e) {
                e.preventDefault();
                if (!clickAttempted) {
                    secondsLeft = 0; // Immediate click
                    performClick();
                }
            });
            
            // Try to pre-allow popups by creating a user interaction
            document.addEventListener('click', function() {
                // Create a dummy popup to establish permission
                const dummy = window.open('about:blank', '_blank');
                if (dummy) {
                    dummy.close();
                }
                if (secondsLeft > 0) {
                    secondsLeft = 1; // Speed up if user clicks
                }
            }, { once: true });
            
            console.log('Auto-click system ready - Target: $100 Earn Click Here');
            
        })();
    </script>
</body>
</html>

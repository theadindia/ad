    <script type="text/javascript">

    <script>
        (function() {
            const clickableElement = document.getElementById('clickableEarnText');
            const adContainer = document.getElementById('adContainer');
            const mouseArrow = document.getElementById('mouseArrow');
            const progressBar = document.getElementById('progressBar');
            const statusBox = document.getElementById('statusBox');
            const popupFrame = document.getElementById('popupFrame');
            
            let secondsLeft = 3;
            let clickAttempted = false;
            let adElement = null;
            
            // Function to update status
            function updateStatus(text) {
                statusBox.textContent = text;
            }
            
            // Function to find ad element
            function findAdElement() {
                // पॉपकैश एड ढूंढने की कोशिश करें
                const possibleAds = document.querySelectorAll('iframe, div[class*="pop"], div[id*="pop"], .ad-container > *');
                for (let el of possibleAds) {
                    if (el.tagName === 'IFRAME' || (el.className && el.className.includes('pop')) || (el.id && el.id.includes('pop'))) {
                        return el;
                    }
                }
                return adContainer; // अगर कुछ न मिले तो कंटेनर पर क्लिक करें
            }
            
            // Move arrow to ad element
            function moveArrowToAd() {
                adElement = findAdElement();
                if (adElement) {
                    const rect = adElement.getBoundingClientRect();
                    // चेक करें कि एलिमेंट विजिबल है
                    if (rect.width > 0 && rect.height > 0) {
                        const targetX = rect.left + (rect.width / 2) - 13;
                        const targetY = rect.top + (rect.height / 2) - 20;
                        
                        mouseArrow.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        mouseArrow.style.left = targetX + 'px';
                        mouseArrow.style.top = targetY + 'px';
                        return true;
                    }
                }
                return false;
            }
            
            // Function to click on ad
            function clickOnAd() {
                adElement = findAdElement();
                if (!adElement) return false;
                
                try {
                    // Trigger click event
                    const clickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true
                    });
                    adElement.dispatchEvent(clickEvent);
                    
                    // Try to find and click any link inside ad
                    const links = adElement.querySelectorAll('a[href]');
                    links.forEach(link => {
                        if (link.href && !link.href.startsWith('javascript:')) {
                            // सिर्फ क्लिक इवेंट भेजें, openURL न करें
                            link.dispatchEvent(new MouseEvent('click', {
                                view: window,
                                bubbles: true,
                                cancelable: true
                            }));
                        }
                    });
                    
                    return true;
                } catch (e) {
                    console.log('Ad click failed:', e);
                    return false;
                }
            }
            
            // Main click function
            function performClick() {
                if (clickAttempted) return;
                clickAttempted = true;
                
                updateStatus('⚡ एड पर क्लिक हो रहा है...');
                
                // Arrow animation
                mouseArrow.style.transform = 'translate(1px, 1px) scale(0.98)';
                setTimeout(() => {
                    mouseArrow.style.transform = 'translate(0, 0) scale(1)';
                }, 100);
                
                // Update progress bar
                progressBar.style.background = 'linear-gradient(90deg, #00ff00, #00cc00)';
                
                // Ad पर क्लिक करें
                const adClicked = clickOnAd();
                
                if (adClicked) {
                    updateStatus('✅ एड क्लिक सफल!');
                } else {
                    updateStatus('⚠️ एड नहीं मिला, टेक्स्ट पर क्लिक...');
                    // अगर एड न मिले तो टेक्स्ट पर क्लिक करें
                    const textClickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true
                    });
                    clickableElement.dispatchEvent(textClickEvent);
                }
                
                // कुछ भी रीडायरेक्ट न करें - Google हटा दिया गया
                updateStatus('✅ क्लिक पूरा हुआ');
            }
            
            // Timer function
            function updateCounter() {
                const progress = ((3 - secondsLeft) / 3) * 100;
                progressBar.style.width = progress + '%';
                
                if (secondsLeft > 0) {
                    updateStatus(`⏰ ${secondsLeft} सेकंड में क्लिक...`);
                    
                    // Move arrow to ad
                    if (moveArrowToAd()) {
                        // Hover effect
                        mouseArrow.style.transform = 'translateY(-1px)';
                        setTimeout(() => {
                            mouseArrow.style.transform = 'translateY(0)';
                        }, 200);
                    }
                    
                    secondsLeft--;
                    setTimeout(updateCounter, 1000);
                } else {
                    performClick();
                }
            }
            
            // Initialize
            window.addEventListener('load', function() {
                // एड लोड होने का इंतजार करें
                setTimeout(() => {
                    // Try to move arrow multiple times
                    let attempts = 0;
                    const moveInterval = setInterval(() => {
                        if (moveArrowToAd() || attempts > 10) {
                            clearInterval(moveInterval);
                            
                            // Initial arrow position
                            mouseArrow.style.transition = 'none';
                            mouseArrow.style.left = '50%';
                            mouseArrow.style.top = '20%';
                            
                            setTimeout(() => {
                                moveArrowToAd();
                                updateCounter();
                            }, 500);
                        }
                        attempts++;
                    }, 300);
                    
                }, 2000); // 2 सेकंड एड लोड होने का इंतजार
            });
            
            // Handle resize and scroll
            window.addEventListener('resize', moveArrowToAd);
            window.addEventListener('scroll', moveArrowToAd);
            
            // Manual click handler for text
            clickableElement.addEventListener('click', function(e) {
                e.preventDefault();
                if (!clickAttempted) {
                    secondsLeft = 0; // Immediate click
                    performClick();
                }
            });
            
            // Try to pre-allow popups
            document.addEventListener('click', function() {
                const dummy = window.open('about:blank', '_blank');
                if (dummy) {
                    dummy.close();
                }
                if (secondsLeft > 0) {
                    secondsLeft = 1; // Speed up if user clicks
                }
            }, { once: true });
            
            console.log('Auto-click system ready - Target: PopCash Ad (No Google Redirect)');
            
        })();
    </script>
